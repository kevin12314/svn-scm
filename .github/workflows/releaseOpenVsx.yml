name: release Open VSX

on:
  workflow_dispatch:
  push:
    tags:
     - "v*"

jobs:
  build:
   runs-on: ubuntu-latest
   steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10.17.0
        run_install: false

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'

    - name: Fetch tags
      run: git fetch --tags -f || true

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Release Open VSX
      run: |
        pnpm add iconv-lite jschardet
        pnpm exec vsce package -o svn-scm-ovsx.vsix
        pnpm exec ovsx publish svn-scm-ovsx.vsix -p ${{ secrets.ovsxToken }}

    - name: Get tag
      id: getTag
      uses: "WyriHaximus/github-action-get-previous-tag@master"
      env:
        GITHUB_TOKEN: "${{ secrets.githubToken }}"

    - name: Upload Open VSX to release
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.githubToken }}
        file: svn-scm-ovsx.vsix
        tag: ${{ steps.getTag.outputs.tag }}
