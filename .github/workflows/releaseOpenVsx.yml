name: release Open VSX
run-name: Open VSX package${{ github.event_name == 'workflow_dispatch' && inputs.publish && ' and publish' || '' }}

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the packaged VSIX to Open VSX
        required: false
        default: false
        type: boolean
  push:
    tags:
     - "v*"

jobs:
  build:
   runs-on: ubuntu-latest
   steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10.17.0
        run_install: false

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'

    - name: Fetch tags
      run: git fetch --tags -f || true

    - name: Install dependencies
      run: pnpm install --frozen-lockfile --config.node-linker=hoisted

    - name: Package Open VSX
      run: pnpm run package:ovsx

    - name: Publish Open VSX
      if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish }}
      env:
        OVSX_TOKEN: ${{ secrets.ovsxToken }}
      run: |
        if [ -z "$OVSX_TOKEN" ]; then
          echo "Missing Actions secret: ovsxToken"
          exit 1
        fi

        pnpm exec ovsx publish svn-scm-ovsx.vsix -p "$OVSX_TOKEN"

    - name: Get tag
      id: getTag
      uses: "WyriHaximus/github-action-get-previous-tag@master"
      env:
        GITHUB_TOKEN: "${{ secrets.githubToken }}"

    - name: Upload Open VSX to release
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.githubToken }}
        file: svn-scm-ovsx.vsix
        tag: ${{ steps.getTag.outputs.tag }}
